<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — Villa Mira Kalkan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;1,300&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #1C2B2E;
      --teal:   #5DCAA5;
      --text:   #E8F2EE;
      --text2:  #8AADA4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: var(--forest);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .icon {
      width: 64px; height: 64px;
      border: 1px solid rgba(93,202,165,.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 2rem;
    }
    .icon svg { width: 28px; height: 28px; color: var(--teal); }

    .lbl {
      font-size: .62rem;
      font-weight: 500;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 1rem;
      display: block;
    }

    h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 1.2rem;
    }
    h1 em { font-style: italic; color: var(--teal); }

    p {
      font-size: .95rem;
      font-weight: 300;
      color: var(--text2);
      max-width: 400px;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    a {
      display: inline-block;
      font-size: .7rem;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      padding: .9rem 2rem;
      background: var(--teal);
      color: var(--forest);
      border-radius: 100px;
      text-decoration: none;
      transition: background .25s;
    }
    a:hover { background: #6EDAB5; }

    .divider {
      width: 40px; height: 1px;
      background: var(--teal);
      opacity: .25;
      margin: 2rem auto;
    }

    .brand {
      margin-top: 3rem;
      font-family: 'Fraunces', serif;
      font-size: .9rem;
      font-weight: 300;
      color: rgba(232,242,238,.25);
    }
    .brand small {
      display: block;
      font-family: 'Outfit', sans-serif;
      font-size: .55rem;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: rgba(93,202,165,.3);
      margin-top: 3px;
    }
  </style>
</head>
<body>

  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>

  <span class="lbl">Message Received</span>

  <h1>Thank You<br><em>for Reaching Out</em></h1>

  <p>We've received your enquiry and will get back to you within 24 hours. We look forward to welcoming you to Villa Mira.</p>

  <a href="index.html">← Back to Villa Mira</a>

  <div class="divider"></div>

  <div class="brand">
    Villa Mira
    <small>Kalkan · Turkey</small>
  </div>

</body>
</html>
